name: Package Pack Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/package-pack-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/pack-smoke.mjs'
      - 'scripts/check-plugin-kit-extraction-boundary.mjs'
      - 'test-fixtures/plugin-kit-channel-adapter/**'
      - 'runtime/**'
      - 'mcp/**'
      - 'docs-mcp/**'
      - 'docs/PLUGIN_KIT.md'
      - 'docs/VERSION_DOCS_MAP.md'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/package-pack-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/pack-smoke.mjs'
      - 'scripts/check-plugin-kit-extraction-boundary.mjs'
      - 'test-fixtures/plugin-kit-channel-adapter/**'
      - 'runtime/**'
      - 'mcp/**'
      - 'docs-mcp/**'
      - 'docs/PLUGIN_KIT.md'
      - 'docs/VERSION_DOCS_MAP.md'

jobs:
  pack-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Check plugin-kit extraction boundary
        run: npm run check:plugin-kit-boundary

      - name: Run package pack smoke test
        run: npm run pack:smoke
