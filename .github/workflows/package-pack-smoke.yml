name: Package Pack Smoke

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/package-pack-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/pack-smoke.mjs'
      - 'runtime/**'
      - 'mcp/**'
      - 'docs-mcp/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/package-pack-smoke.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/pack-smoke.mjs'
      - 'runtime/**'
      - 'mcp/**'
      - 'docs-mcp/**'

jobs:
  pack-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Run package pack smoke test
        run: npm run pack:smoke
