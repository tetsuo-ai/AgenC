name: Private Proof CI

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'
  pull_request:
    branches:
      - main
    paths: &private_proof_paths
      - '.github/workflows/private-proof-ci.yml'
      - 'Anchor.toml'
      - 'Cargo.lock'
      - 'Cargo.toml'
      - 'package-lock.json'
      - 'package.json'
      - 'programs/**'
      - 'scripts/idl/verifier_router.json'
      - 'scripts/run-e2e-zk-local.sh'
      - 'scripts/setup-verifier-localnet.sh'
      - 'scripts/setup-verifier-localnet.ts'
      - 'tests/e2e-real-proof.ts'
      - 'tests/fixtures/real-groth16-proof.json'
      - 'tests/test-utils.ts'
      - 'tests/zk-proof-lifecycle.ts'
      - 'zkvm/**'
  push:
    branches:
      - main
    paths: *private_proof_paths

permissions:
  contents: read

concurrency:
  group: private-proof-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  SOLANA_VERSION: '3.0.13'
  ANCHOR_VERSION: '0.32.1'
  VERIFIER_ANCHOR_VERSION: '0.31.1'
  RISC0_SOLANA_REF: 'v3.0.0'
  VALIDATOR_READY_TIMEOUT_SECONDS: '600'

jobs:
  private_proof_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libssl-dev \
            libudev-dev \
            pkg-config

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: stable

      - name: Install Solana CLI
        run: |
          curl -sSfL "https://release.anza.xyz/v${SOLANA_VERSION}/install" | sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install "${VERIFIER_ANCHOR_VERSION}"
          avm install "${ANCHOR_VERSION}"
          avm use "${ANCHOR_VERSION}"
          echo "$HOME/.avm/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain versions
        run: |
          node --version
          npm --version
          rustc --version
          cargo --version
          solana --version
          anchor --version

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Create local validator wallet
        run: |
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --force --no-bip39-passphrase -o "$HOME/.config/solana/id.json"
          solana config set --url http://127.0.0.1:8899 --keypair "$HOME/.config/solana/id.json"

      - name: Fetch real verifier sources
        run: |
          rm -rf /tmp/risc0-solana
          git clone --depth 1 --branch "${RISC0_SOLANA_REF}" \
            https://github.com/boundless-xyz/risc0-solana \
            /tmp/risc0-solana
          test -d /tmp/risc0-solana/solana-verifier

      - name: Build AgenC program
        run: anchor build

      - name: Run private proof end-to-end gate
        run: npm run test:e2e-zk

      - name: Assert verifier bootstrap stayed in real mode
        if: always() && hashFiles('target/verifier-validator.log') != ''
        run: |
          test -f target/verifier-validator.log
          grep -q "Mode:             real" target/verifier-validator.log

      - name: Upload verifier bootstrap log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-proof-validator-log-${{ github.run_id }}
          retention-days: 14
          if-no-files-found: ignore
          path: target/verifier-validator.log
