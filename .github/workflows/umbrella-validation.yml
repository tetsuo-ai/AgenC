name: Umbrella Validation

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/dependabot.yml'
      - '.github/workflows/umbrella-validation.yml'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CODEX.md'
      - 'README.md'
      - 'REFACTOR.MD'
      - 'REFACTOR-MASTER-PROGRAM.md'
      - 'docs/REPOSITORY_TOPOLOGY.md'
      - 'docs/SDK.md'
      - 'docs/PLUGIN_KIT.md'
      - 'docs/VERSION_DOCS_MAP.md'
      - 'examples/README.md'
      - 'examples/tsconfig.public-example.base.json'
      - 'examples/simple-usage/**'
      - 'examples/tetsuo-integration/**'
      - 'examples/helius-webhook/**'
      - 'examples/risc0-proof-demo/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/bootstrap-agenc-repos.sh'
      - 'scripts/check-public-contract-boundary.mjs'
      - 'scripts/check-umbrella-boundary.mjs'
      - 'scripts/smoke-test-examples.sh'
  push:
    branches:
      - main
    paths:
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/dependabot.yml'
      - '.github/workflows/umbrella-validation.yml'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'CODEX.md'
      - 'README.md'
      - 'REFACTOR.MD'
      - 'REFACTOR-MASTER-PROGRAM.md'
      - 'docs/REPOSITORY_TOPOLOGY.md'
      - 'docs/SDK.md'
      - 'docs/PLUGIN_KIT.md'
      - 'docs/VERSION_DOCS_MAP.md'
      - 'examples/README.md'
      - 'examples/tsconfig.public-example.base.json'
      - 'examples/simple-usage/**'
      - 'examples/tetsuo-integration/**'
      - 'examples/helius-webhook/**'
      - 'examples/risc0-proof-demo/**'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/bootstrap-agenc-repos.sh'
      - 'scripts/check-public-contract-boundary.mjs'
      - 'scripts/check-umbrella-boundary.mjs'
      - 'scripts/smoke-test-examples.sh'

jobs:
  umbrella:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install workspace dependencies
        run: npm install --no-fund

      - name: Check extracted public-contract boundaries
        run: npm run check:public-contract-boundary

      - name: Check umbrella boundary
        run: npm run check:umbrella-boundary

      - name: Typecheck retained public examples
        run: npm run check:public-examples

      - name: Verify bootstrap script help
        run: ./scripts/bootstrap-agenc-repos.sh --help >/dev/null
