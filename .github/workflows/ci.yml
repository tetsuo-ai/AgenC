name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  MUTATION_MAX_AGGREGATE_PASS_RATE_DROP: '0.60'
  MUTATION_MAX_AGGREGATE_CONFORMANCE_DROP: '0.35'
  MUTATION_MAX_AGGREGATE_COST_UTILITY_DROP: '0.45'
  MUTATION_MAX_SCENARIO_PASS_RATE_DROP: '1.00'
  MUTATION_MAX_OPERATOR_PASS_RATE_DROP: '0.60'
  PIPELINE_MAX_CONTEXT_GROWTH_SLOPE: '120'
  PIPELINE_MAX_CONTEXT_GROWTH_DELTA: '220'
  PIPELINE_MAX_TOKENS_PER_COMPLETED_TASK: '2000'
  PIPELINE_MAX_MALFORMED_TOOL_TURN_FORWARDED: '0'
  PIPELINE_MIN_MALFORMED_TOOL_TURN_REJECTED_RATE: '1'
  PIPELINE_MAX_DESKTOP_FAILED_RUNS: '0'
  PIPELINE_MAX_DESKTOP_TIMEOUT_RUNS: '0'
  PIPELINE_MAX_OFFLINE_REPLAY_FAILURES: '0'
  PIPELINE_MIN_DELEGATION_ATTEMPT_RATE: '0.30'
  PIPELINE_MAX_DELEGATION_ATTEMPT_RATE: '0.95'
  PIPELINE_MIN_USEFUL_DELEGATION_RATE: '0.60'
  PIPELINE_MAX_HARMFUL_DELEGATION_RATE: '0.30'
  PIPELINE_MAX_PLANNER_TO_EXECUTION_MISMATCH_RATE: '0.25'
  PIPELINE_MAX_CHILD_TIMEOUT_RATE: '0.20'
  PIPELINE_MAX_CHILD_FAILURE_RATE: '0.25'
  PIPELINE_MAX_SYNTHESIS_CONFLICT_RATE: '0.20'
  PIPELINE_MAX_DEPTH_CAP_HIT_RATE: '0.20'
  PIPELINE_MAX_FANOUT_CAP_HIT_RATE: '0.20'
  PIPELINE_MAX_COST_DELTA_VS_BASELINE: '0.80'
  PIPELINE_MAX_LATENCY_DELTA_VS_BASELINE: '60'
  PIPELINE_MIN_QUALITY_DELTA_VS_BASELINE: '0'
  PIPELINE_MIN_PASS_AT_K_DELTA_VS_BASELINE: '0'
  PIPELINE_MIN_PASS_CARET_K_DELTA_VS_BASELINE: '0'
  PIPELINE_FAIL_FAST_HARMFUL_DELEGATION_RATE: '0.45'
  PIPELINE_FAIL_FAST_RUNAWAY_CAP_HIT_RATE: '0.40'

jobs:
  runtime_checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enforce Borsh non-ZST deserialization guard
        run: node scripts/check-borsh-zst-guard.mjs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund --prefix sdk
          npm install --no-audit --no-fund --prefix runtime
          npm install --no-audit --no-fund --prefix mcp

      - name: Runtime tests
        run: |
          npm run check-idl-drift --prefix runtime
          npm run test --prefix runtime -- \
            --exclude tests/integration.test.ts \
            --exclude tests/eval-replay.integration.test.ts \
            --exclude tests/benchmark-runner.integration.test.ts

      - name: Runtime typecheck
        run: npm run typecheck --prefix runtime

      - name: Build runtime package
        run: npm_config_ignore_scripts=true npm run build --prefix runtime

      - name: MCP typecheck
        run: npm run typecheck --prefix mcp

      - name: MCP tests
        run: npm run test --prefix mcp

  desktop_image_checks:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Desktop hardening guard
        run: npm run security:desktop:hardening:check

      - name: Build desktop image
        run: docker build -t agenc/desktop:latest containers/desktop

      - name: Smoke Doom MCP desktop image
        run: npm run desktop:image:doom:smoke

  reliability_regression:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    needs: runtime_checks
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund --prefix sdk
          npm install --no-audit --no-fund --prefix runtime
          npm install --no-audit --no-fund --prefix mcp

      - name: Run benchmark corpus
        run: npm run benchmark:ci --prefix runtime

      - name: Run mutation suite
        run: npm run mutation:ci --prefix runtime

      - name: Enforce mutation regression gates
        run: |
          npx tsx runtime/scripts/check-mutation-gates.ts \
            --artifact runtime/benchmarks/artifacts/mutation.ci.json \
            --max-aggregate-pass-rate-drop "${MUTATION_MAX_AGGREGATE_PASS_RATE_DROP}" \
            --max-aggregate-conformance-drop "${MUTATION_MAX_AGGREGATE_CONFORMANCE_DROP}" \
            --max-aggregate-cost-utility-drop "${MUTATION_MAX_AGGREGATE_COST_UTILITY_DROP}" \
            --max-scenario-pass-rate-drop "${MUTATION_MAX_SCENARIO_PASS_RATE_DROP}" \
            --max-operator-pass-rate-drop "${MUTATION_MAX_OPERATOR_PASS_RATE_DROP}"

      - name: Run pipeline quality suite
        run: npm run benchmark:pipeline:ci --prefix runtime

      - name: Enforce pipeline quality gates
        run: |
          npx tsx runtime/scripts/check-pipeline-gates.ts \
            --artifact runtime/benchmarks/artifacts/pipeline-quality.ci.json \
            --max-context-growth-slope "${PIPELINE_MAX_CONTEXT_GROWTH_SLOPE}" \
            --max-context-growth-delta "${PIPELINE_MAX_CONTEXT_GROWTH_DELTA}" \
            --max-tokens-per-completed-task "${PIPELINE_MAX_TOKENS_PER_COMPLETED_TASK}" \
            --max-malformed-tool-turn-forwarded "${PIPELINE_MAX_MALFORMED_TOOL_TURN_FORWARDED}" \
            --min-malformed-tool-turn-rejected-rate "${PIPELINE_MIN_MALFORMED_TOOL_TURN_REJECTED_RATE}" \
            --max-desktop-failed-runs "${PIPELINE_MAX_DESKTOP_FAILED_RUNS}" \
            --max-desktop-timeout-runs "${PIPELINE_MAX_DESKTOP_TIMEOUT_RUNS}" \
            --max-offline-replay-failures "${PIPELINE_MAX_OFFLINE_REPLAY_FAILURES}" \
            --min-delegation-attempt-rate "${PIPELINE_MIN_DELEGATION_ATTEMPT_RATE}" \
            --max-delegation-attempt-rate "${PIPELINE_MAX_DELEGATION_ATTEMPT_RATE}" \
            --min-useful-delegation-rate "${PIPELINE_MIN_USEFUL_DELEGATION_RATE}" \
            --max-harmful-delegation-rate "${PIPELINE_MAX_HARMFUL_DELEGATION_RATE}" \
            --max-planner-to-execution-mismatch-rate "${PIPELINE_MAX_PLANNER_TO_EXECUTION_MISMATCH_RATE}" \
            --max-child-timeout-rate "${PIPELINE_MAX_CHILD_TIMEOUT_RATE}" \
            --max-child-failure-rate "${PIPELINE_MAX_CHILD_FAILURE_RATE}" \
            --max-synthesis-conflict-rate "${PIPELINE_MAX_SYNTHESIS_CONFLICT_RATE}" \
            --max-depth-cap-hit-rate "${PIPELINE_MAX_DEPTH_CAP_HIT_RATE}" \
            --max-fanout-cap-hit-rate "${PIPELINE_MAX_FANOUT_CAP_HIT_RATE}" \
            --max-cost-delta-vs-baseline "${PIPELINE_MAX_COST_DELTA_VS_BASELINE}" \
            --max-latency-delta-vs-baseline "${PIPELINE_MAX_LATENCY_DELTA_VS_BASELINE}" \
            --min-quality-delta-vs-baseline "${PIPELINE_MIN_QUALITY_DELTA_VS_BASELINE}" \
            --min-pass-at-k-delta-vs-baseline "${PIPELINE_MIN_PASS_AT_K_DELTA_VS_BASELINE}" \
            --min-pass-caret-k-delta-vs-baseline "${PIPELINE_MIN_PASS_CARET_K_DELTA_VS_BASELINE}" \
            --fail-fast-harmful-delegation-rate "${PIPELINE_FAIL_FAST_HARMFUL_DELEGATION_RATE}" \
            --fail-fast-runaway-cap-hit-rate "${PIPELINE_FAIL_FAST_RUNAWAY_CAP_HIT_RATE}"

      - name: Run background-run quality suite
        run: npm run benchmark:background-runs:ci --prefix runtime

      - name: Enforce background-run quality gates
        run: |
          npx tsx runtime/scripts/check-background-run-gates.ts \
            --artifact runtime/benchmarks/artifacts/background-run-quality.ci.json

      - name: Run decomposition delegation benchmark suite
        run: npm run benchmark:delegation --prefix runtime

      - name: Run delegation quality suite (CI profile)
        run: npm run benchmark:delegation:ci --prefix runtime

      - name: Enforce delegation quality gates
        run: |
          npx tsx runtime/scripts/check-pipeline-gates.ts \
            --artifact runtime/benchmarks/artifacts/delegation-quality.ci.json \
            --max-context-growth-slope "${PIPELINE_MAX_CONTEXT_GROWTH_SLOPE}" \
            --max-context-growth-delta "${PIPELINE_MAX_CONTEXT_GROWTH_DELTA}" \
            --max-tokens-per-completed-task "${PIPELINE_MAX_TOKENS_PER_COMPLETED_TASK}" \
            --max-malformed-tool-turn-forwarded "${PIPELINE_MAX_MALFORMED_TOOL_TURN_FORWARDED}" \
            --min-malformed-tool-turn-rejected-rate "${PIPELINE_MIN_MALFORMED_TOOL_TURN_REJECTED_RATE}" \
            --max-desktop-failed-runs "${PIPELINE_MAX_DESKTOP_FAILED_RUNS}" \
            --max-desktop-timeout-runs "${PIPELINE_MAX_DESKTOP_TIMEOUT_RUNS}" \
            --max-offline-replay-failures "${PIPELINE_MAX_OFFLINE_REPLAY_FAILURES}" \
            --min-delegation-attempt-rate "${PIPELINE_MIN_DELEGATION_ATTEMPT_RATE}" \
            --max-delegation-attempt-rate "${PIPELINE_MAX_DELEGATION_ATTEMPT_RATE}" \
            --min-useful-delegation-rate "${PIPELINE_MIN_USEFUL_DELEGATION_RATE}" \
            --max-harmful-delegation-rate "${PIPELINE_MAX_HARMFUL_DELEGATION_RATE}" \
            --max-planner-to-execution-mismatch-rate "${PIPELINE_MAX_PLANNER_TO_EXECUTION_MISMATCH_RATE}" \
            --max-child-timeout-rate "${PIPELINE_MAX_CHILD_TIMEOUT_RATE}" \
            --max-child-failure-rate "${PIPELINE_MAX_CHILD_FAILURE_RATE}" \
            --max-synthesis-conflict-rate "${PIPELINE_MAX_SYNTHESIS_CONFLICT_RATE}" \
            --max-depth-cap-hit-rate "${PIPELINE_MAX_DEPTH_CAP_HIT_RATE}" \
            --max-fanout-cap-hit-rate "${PIPELINE_MAX_FANOUT_CAP_HIT_RATE}" \
            --max-cost-delta-vs-baseline "${PIPELINE_MAX_COST_DELTA_VS_BASELINE}" \
            --max-latency-delta-vs-baseline "${PIPELINE_MAX_LATENCY_DELTA_VS_BASELINE}" \
            --min-quality-delta-vs-baseline "${PIPELINE_MIN_QUALITY_DELTA_VS_BASELINE}" \
            --min-pass-at-k-delta-vs-baseline "${PIPELINE_MIN_PASS_AT_K_DELTA_VS_BASELINE}" \
            --min-pass-caret-k-delta-vs-baseline "${PIPELINE_MIN_PASS_CARET_K_DELTA_VS_BASELINE}" \
            --fail-fast-harmful-delegation-rate "${PIPELINE_FAIL_FAST_HARMFUL_DELEGATION_RATE}" \
            --fail-fast-runaway-cap-hit-rate "${PIPELINE_FAIL_FAST_RUNAWAY_CAP_HIT_RATE}"

      - name: Enforce autonomy rollout gates
        run: |
          npx tsx runtime/scripts/check-autonomy-rollout-gates.ts \
            --config runtime/benchmarks/autonomy-gateway.ci.json \
            --artifact runtime/benchmarks/artifacts/background-run-quality.ci.json \
            --delegation-artifact runtime/benchmarks/artifacts/delegation-benchmark.latest.json \
            --manifest docs/autonomy-runtime-rollout.manifest.json \
            --mode limited

      - name: Upload reliability artifacts
        uses: actions/upload-artifact@v4
        with:
          name: reliability-artifacts-${{ github.run_id }}
          retention-days: 14
          path: |
            runtime/benchmarks/artifacts/ci.json
            runtime/benchmarks/artifacts/mutation.ci.json
            runtime/benchmarks/artifacts/mutation-trend.ci.json
            runtime/benchmarks/artifacts/pipeline-quality.ci.json
            runtime/benchmarks/artifacts/background-run-quality.ci.json
            runtime/benchmarks/artifacts/delegation-benchmark.latest.json
            runtime/benchmarks/artifacts/delegation-quality.ci.json

  nightly_reliability:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm install --no-audit --no-fund --prefix sdk
          npm install --no-audit --no-fund --prefix runtime
          npm install --no-audit --no-fund --prefix mcp

      - name: Run nightly benchmark corpus
        run: |
          npx tsx runtime/scripts/run-benchmarks.ts \
            --output runtime/benchmarks/artifacts/nightly-benchmark.json

      - name: Run nightly mutation suite
        run: |
          npx tsx runtime/scripts/run-mutations.ts \
            --output runtime/benchmarks/artifacts/nightly-mutation.json \
            --trend-output runtime/benchmarks/artifacts/nightly-mutation-trend.json

      - name: Run nightly pipeline quality suite
        run: |
          npx tsx runtime/scripts/run-pipeline-quality.ts \
            --output runtime/benchmarks/artifacts/nightly-pipeline-quality.json

      - name: Run nightly background-run quality suite
        run: |
          npx tsx runtime/scripts/run-background-run-quality.ts \
            --output runtime/benchmarks/artifacts/nightly-background-run-quality.json

      - name: Run nightly decomposition delegation benchmark suite
        run: |
          npx tsx runtime/scripts/run-delegation-benchmarks.ts \
            --output runtime/benchmarks/artifacts/nightly-delegation-benchmark.json

      - name: Run nightly delegation quality suite
        run: |
          npx tsx runtime/scripts/run-pipeline-quality.ts \
            --output runtime/benchmarks/artifacts/nightly-delegation-quality.json \
            --desktop-runs 0 \
            --delegation-k 2

      - name: Nightly gate report (dry-run)
        run: |
          npx tsx runtime/scripts/check-mutation-gates.ts \
            --artifact runtime/benchmarks/artifacts/nightly-mutation.json \
            --max-aggregate-pass-rate-drop "${MUTATION_MAX_AGGREGATE_PASS_RATE_DROP}" \
            --max-aggregate-conformance-drop "${MUTATION_MAX_AGGREGATE_CONFORMANCE_DROP}" \
            --max-aggregate-cost-utility-drop "${MUTATION_MAX_AGGREGATE_COST_UTILITY_DROP}" \
            --max-scenario-pass-rate-drop "${MUTATION_MAX_SCENARIO_PASS_RATE_DROP}" \
            --max-operator-pass-rate-drop "${MUTATION_MAX_OPERATOR_PASS_RATE_DROP}" \
            --dry-run

      - name: Nightly pipeline gate report (dry-run)
        run: |
          npx tsx runtime/scripts/check-pipeline-gates.ts \
            --artifact runtime/benchmarks/artifacts/nightly-pipeline-quality.json \
            --max-context-growth-slope "${PIPELINE_MAX_CONTEXT_GROWTH_SLOPE}" \
            --max-context-growth-delta "${PIPELINE_MAX_CONTEXT_GROWTH_DELTA}" \
            --max-tokens-per-completed-task "${PIPELINE_MAX_TOKENS_PER_COMPLETED_TASK}" \
            --max-malformed-tool-turn-forwarded "${PIPELINE_MAX_MALFORMED_TOOL_TURN_FORWARDED}" \
            --min-malformed-tool-turn-rejected-rate "${PIPELINE_MIN_MALFORMED_TOOL_TURN_REJECTED_RATE}" \
            --max-desktop-failed-runs "${PIPELINE_MAX_DESKTOP_FAILED_RUNS}" \
            --max-desktop-timeout-runs "${PIPELINE_MAX_DESKTOP_TIMEOUT_RUNS}" \
            --max-offline-replay-failures "${PIPELINE_MAX_OFFLINE_REPLAY_FAILURES}" \
            --min-delegation-attempt-rate "${PIPELINE_MIN_DELEGATION_ATTEMPT_RATE}" \
            --max-delegation-attempt-rate "${PIPELINE_MAX_DELEGATION_ATTEMPT_RATE}" \
            --min-useful-delegation-rate "${PIPELINE_MIN_USEFUL_DELEGATION_RATE}" \
            --max-harmful-delegation-rate "${PIPELINE_MAX_HARMFUL_DELEGATION_RATE}" \
            --max-planner-to-execution-mismatch-rate "${PIPELINE_MAX_PLANNER_TO_EXECUTION_MISMATCH_RATE}" \
            --max-child-timeout-rate "${PIPELINE_MAX_CHILD_TIMEOUT_RATE}" \
            --max-child-failure-rate "${PIPELINE_MAX_CHILD_FAILURE_RATE}" \
            --max-synthesis-conflict-rate "${PIPELINE_MAX_SYNTHESIS_CONFLICT_RATE}" \
            --max-depth-cap-hit-rate "${PIPELINE_MAX_DEPTH_CAP_HIT_RATE}" \
            --max-fanout-cap-hit-rate "${PIPELINE_MAX_FANOUT_CAP_HIT_RATE}" \
            --max-cost-delta-vs-baseline "${PIPELINE_MAX_COST_DELTA_VS_BASELINE}" \
            --max-latency-delta-vs-baseline "${PIPELINE_MAX_LATENCY_DELTA_VS_BASELINE}" \
            --min-quality-delta-vs-baseline "${PIPELINE_MIN_QUALITY_DELTA_VS_BASELINE}" \
            --min-pass-at-k-delta-vs-baseline "${PIPELINE_MIN_PASS_AT_K_DELTA_VS_BASELINE}" \
            --min-pass-caret-k-delta-vs-baseline "${PIPELINE_MIN_PASS_CARET_K_DELTA_VS_BASELINE}" \
            --fail-fast-harmful-delegation-rate "${PIPELINE_FAIL_FAST_HARMFUL_DELEGATION_RATE}" \
            --fail-fast-runaway-cap-hit-rate "${PIPELINE_FAIL_FAST_RUNAWAY_CAP_HIT_RATE}" \
            --dry-run

      - name: Nightly delegation gate report (dry-run)
        run: |
          npx tsx runtime/scripts/check-pipeline-gates.ts \
            --artifact runtime/benchmarks/artifacts/nightly-delegation-quality.json \
            --max-context-growth-slope "${PIPELINE_MAX_CONTEXT_GROWTH_SLOPE}" \
            --max-context-growth-delta "${PIPELINE_MAX_CONTEXT_GROWTH_DELTA}" \
            --max-tokens-per-completed-task "${PIPELINE_MAX_TOKENS_PER_COMPLETED_TASK}" \
            --max-malformed-tool-turn-forwarded "${PIPELINE_MAX_MALFORMED_TOOL_TURN_FORWARDED}" \
            --min-malformed-tool-turn-rejected-rate "${PIPELINE_MIN_MALFORMED_TOOL_TURN_REJECTED_RATE}" \
            --max-desktop-failed-runs "${PIPELINE_MAX_DESKTOP_FAILED_RUNS}" \
            --max-desktop-timeout-runs "${PIPELINE_MAX_DESKTOP_TIMEOUT_RUNS}" \
            --max-offline-replay-failures "${PIPELINE_MAX_OFFLINE_REPLAY_FAILURES}" \
            --min-delegation-attempt-rate "${PIPELINE_MIN_DELEGATION_ATTEMPT_RATE}" \
            --max-delegation-attempt-rate "${PIPELINE_MAX_DELEGATION_ATTEMPT_RATE}" \
            --min-useful-delegation-rate "${PIPELINE_MIN_USEFUL_DELEGATION_RATE}" \
            --max-harmful-delegation-rate "${PIPELINE_MAX_HARMFUL_DELEGATION_RATE}" \
            --max-planner-to-execution-mismatch-rate "${PIPELINE_MAX_PLANNER_TO_EXECUTION_MISMATCH_RATE}" \
            --max-child-timeout-rate "${PIPELINE_MAX_CHILD_TIMEOUT_RATE}" \
            --max-child-failure-rate "${PIPELINE_MAX_CHILD_FAILURE_RATE}" \
            --max-synthesis-conflict-rate "${PIPELINE_MAX_SYNTHESIS_CONFLICT_RATE}" \
            --max-depth-cap-hit-rate "${PIPELINE_MAX_DEPTH_CAP_HIT_RATE}" \
            --max-fanout-cap-hit-rate "${PIPELINE_MAX_FANOUT_CAP_HIT_RATE}" \
            --max-cost-delta-vs-baseline "${PIPELINE_MAX_COST_DELTA_VS_BASELINE}" \
            --max-latency-delta-vs-baseline "${PIPELINE_MAX_LATENCY_DELTA_VS_BASELINE}" \
            --min-quality-delta-vs-baseline "${PIPELINE_MIN_QUALITY_DELTA_VS_BASELINE}" \
            --min-pass-at-k-delta-vs-baseline "${PIPELINE_MIN_PASS_AT_K_DELTA_VS_BASELINE}" \
            --min-pass-caret-k-delta-vs-baseline "${PIPELINE_MIN_PASS_CARET_K_DELTA_VS_BASELINE}" \
            --fail-fast-harmful-delegation-rate "${PIPELINE_FAIL_FAST_HARMFUL_DELEGATION_RATE}" \
            --fail-fast-runaway-cap-hit-rate "${PIPELINE_FAIL_FAST_RUNAWAY_CAP_HIT_RATE}" \
            --dry-run

      - name: Nightly background-run gate report (dry-run)
        run: |
          npx tsx runtime/scripts/check-background-run-gates.ts \
            --artifact runtime/benchmarks/artifacts/nightly-background-run-quality.json \
            --dry-run

      - name: Upload nightly reliability artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-reliability-${{ github.run_id }}
          retention-days: 30
          path: |
            runtime/benchmarks/artifacts/nightly-benchmark.json
            runtime/benchmarks/artifacts/nightly-mutation.json
            runtime/benchmarks/artifacts/nightly-mutation-trend.json
            runtime/benchmarks/artifacts/nightly-pipeline-quality.json
            runtime/benchmarks/artifacts/nightly-background-run-quality.json
            runtime/benchmarks/artifacts/nightly-delegation-benchmark.json
            runtime/benchmarks/artifacts/nightly-delegation-quality.json
