[toolchain]
anchor_version = "0.32.1"
solana_version = "3.0.13"

[features]
seeds = true
skip-lint = false

[programs.localnet]
agenc_coordination = "6UcJzbTEemBz3aY5wK5qKHGMD7bdRsmR4smND29gB2ab"

[programs.devnet]
agenc_coordination = "6UcJzbTEemBz3aY5wK5qKHGMD7bdRsmR4smND29gB2ab"

# Mainnet intentionally not configured yet.
# Add [programs.mainnet] only after pre-mainnet security sign-off.

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[test]
startup_wait = 120000
shutdown_wait = 5000
upgradeable = true

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 300000 tests/test-create-task.ts tests/test-claim-task.ts tests/test-lifecycle.ts tests/test-state-machine.ts tests/test-authority.ts tests/test-audit-gaps.ts tests/test-escrow.ts tests/test-disputes.ts tests/test-reputation-stake.ts tests/test-concurrency.ts tests/test-invariants.ts tests/test-reputation-gate.ts tests/dispute-slash-logic.ts tests/spl-token-tasks.ts tests/lifecycle-guards.ts tests/governance.ts tests/agent-feed.ts tests/reputation-economy.ts"

[workspace]
members = ["programs/agenc-coordination"]
